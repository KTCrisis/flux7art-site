<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 630px;
  font-family: 'JetBrains Mono', monospace;
  background: #060a06;
  color: #b8ccb8;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,136,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(168,85,247,0.08), transparent 40%),
    radial-gradient(circle at 60% 20%, rgba(0,229,255,0.05), transparent 35%);
}

body::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
}

.wrap {
  position: relative;
  width: 100%;
  height: 100%;
  padding: 70px 80px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 2;
}

.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: #00ff88;
}
.logo span { color: #ff2d6b; }

.meta {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #5a7a5a;
}

.middle {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.name {
  font-size: 20px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #5a7a5a;
  font-weight: 400;
}

h1 {
  font-size: 68px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -2.5px;
  line-height: 1.05;
  max-width: 1040px;
}
h1 .ag { color: #a855f7; }
h1 .ks { color: #14b8a6; }
h1 .mc { color: #00e5ff; }

.sub {
  font-size: 17px;
  color: #b8ccb8;
  line-height: 1.6;
  max-width: 960px;
  margin-top: 6px;
}
.sub b { color: #fff; font-weight: 400; }

.bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #1a2a1a;
  padding-top: 28px;
}

.tags {
  display: flex;
  gap: 10px;
}
.tag {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 2px;
  border: 1px solid #1a2a1a;
  color: #5a7a5a;
  background: #0c120c;
}
.tag.purple { color: #a855f7; border-color: rgba(168,85,247,0.3); }
.tag.teal { color: #14b8a6; border-color: rgba(13,148,136,0.4); }
.tag.cyan { color: #00e5ff; border-color: rgba(0,229,255,0.3); }
.tag.gold { color: #ffd166; border-color: rgba(255,209,102,0.3); }

.site {
  font-size: 12px;
  color: #5a7a5a;
  letter-spacing: 2px;
}
.site span { color: #00ff88; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="logo">flux<span>7</span>.art</div>
    <div class="meta">// 2026 — open source</div>
  </div>

  <div class="middle">
    <div class="name">Marc Verchiani</div>
    <h1>
      <span class="ag">AI Agent</span> governance,<br>
      <span class="ks">Kafka</span> &amp; <span class="mc">MCP</span><br>
      tooling.
    </h1>
    <p class="sub">
      Engineer building open-source governance layers for AI agents, event streaming pipelines and local model orchestration &mdash; <b>agent-mesh</b>, <b>event7</b>, <b>mem7</b>, <b>arch7</b>.
    </p>
  </div>

  <div class="bottom">
    <div class="tags">
      <div class="tag purple">agent-mesh</div>
      <div class="tag teal">event7</div>
      <div class="tag gold">mem7</div>
      <div class="tag cyan">agent7</div>
    </div>
    <div class="site">flux<span>7</span>.art</div>
  </div>

</div>
</body>
</html>
